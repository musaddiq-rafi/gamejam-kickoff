<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Subway Rush 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', Tahoma, sans-serif; }
  #game { position: fixed; inset: 0; }
  canvas { display: block; }

  .hud {
    position: fixed; top: 14px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 18px; pointer-events: none; z-index: 10;
    text-shadow: 0 2px 6px rgba(0,0,0,.4); color: #fff;
  }
  .hud .score { font-size: 30px; font-weight: 800; letter-spacing: .5px; }
  .hud .sub { font-size: 13px; opacity: .85; font-weight: 600; }
  .hud .coins { font-size: 26px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .coin-icon { width: 22px; height: 22px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffe680, #f5c518); box-shadow: 0 0 8px rgba(245,197,24,.8); }

  .overlay {
    position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; color: #fff;
    background: radial-gradient(ellipse at center, rgba(20,30,60,.55), rgba(10,15,30,.85));
    backdrop-filter: blur(3px);
  }
  .overlay.hidden { display: none; }
  .title { font-size: 54px; font-weight: 900; letter-spacing: 1px; margin-bottom: 6px;
    background: linear-gradient(90deg,#ffd86b,#ff7b54); -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 4px 20px rgba(255,140,60,.4); }
  .subtitle { font-size: 16px; opacity: .9; margin-bottom: 26px; max-width: 420px; line-height: 1.5; }
  .btn {
    pointer-events: auto; cursor: pointer; border: none; border-radius: 40px;
    padding: 16px 46px; font-size: 20px; font-weight: 800; color: #2a1a05;
    background: linear-gradient(180deg,#ffe27a,#ffb43d);
    box-shadow: 0 8px 26px rgba(255,160,40,.5); transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 12px 30px rgba(255,160,40,.6); }
  .btn:active { transform: translateY(1px) scale(.98); }
  .final { font-size: 22px; margin: 4px 0 2px; }
  .final b { color: #ffd86b; }
  .keys { margin-top: 22px; font-size: 13px; opacity: .8; line-height: 1.7; }
  .keys kbd { background: rgba(255,255,255,.15); border-radius: 6px; padding: 2px 8px; border: 1px solid rgba(255,255,255,.25); font-weight: 700; }

  .flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 15; }
</style>
</head>
<body>
<div id="game"></div>

<div class="hud">
  <div>
    <div class="score" id="score">0</div>
    <div class="sub">DISTANCE</div>
  </div>
  <div class="coins"><span class="coin-icon"></span><span id="coinCount">0</span></div>
</div>

<div class="flash" id="flash"></div>

<div class="overlay" id="startScreen">
  <div class="title">SUBWAY RUSH 3D</div>
  <div class="subtitle">Dodge trains, leap barriers and slide under signs. Grab coins, don't crash. How far can you run?</div>
  <button class="btn" id="startBtn">PLAY</button>
  <div class="keys">
    <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd> — switch lanes<br/>
    <kbd>↑</kbd> / <kbd>Space</kbd> / <kbd>W</kbd> — jump &nbsp;•&nbsp; <kbd>↓</kbd> / <kbd>S</kbd> — roll<br/>
    On touch: swipe to move, swipe up to jump, swipe down to roll
  </div>
</div>

<div class="overlay hidden" id="overScreen">
  <div class="title" style="font-size:46px;">GAME OVER</div>
  <div class="final">Distance: <b id="finalScore">0</b> m</div>
  <div class="final">Coins: <b id="finalCoins">0</b></div>
  <div class="final" style="font-size:17px;opacity:.85;" id="bestLine"></div>
  <button class="btn" id="restartBtn" style="margin-top:24px;">RUN AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
"use strict";

// ---------------------------------------------------------------------------
// Renderer / Scene / Camera
// ---------------------------------------------------------------------------
const container = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 40, 130);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(0, 4.2, 9);
camera.lookAt(0, 1.5, -10);

// ---------------------------------------------------------------------------
// Lights
// ---------------------------------------------------------------------------
const hemi = new THREE.HemisphereLight(0xffffff, 0x556677, 0.95);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(12, 30, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 80;
sun.shadow.camera.left = -25;
sun.shadow.camera.right = 25;
sun.shadow.camera.top = 30;
sun.shadow.camera.bottom = -30;
scene.add(sun);

// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------
const LANES = [-2.4, 0, 2.4];
const GRAVITY = -42;
const JUMP_V = 15;
const ROLL_TIME = 0.55;
const PLAYER_Z = 0;
const BASE_SPEED = 18;
const DESPAWN_Z = 14;

// ---------------------------------------------------------------------------
// Ground & track
// ---------------------------------------------------------------------------
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 400),
  new THREE.MeshStandardMaterial({ color: 0x3a3f4b, roughness: 1 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, 0, -120);
ground.receiveShadow = true;
scene.add(ground);

// Side grass / sidewalk strips
const sideMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 1 });
[-1, 1].forEach(s => {
  const strip = new THREE.Mesh(new THREE.PlaneGeometry(8, 400), sideMat);
  strip.rotation.x = -Math.PI / 2;
  strip.position.set(s * 13, 0.01, -120);
  strip.receiveShadow = true;
  scene.add(strip);
});

// Scrolling track ties (sleepers) to convey motion
const tieGroup = new THREE.Group();
scene.add(tieGroup);
const tieGeo = new THREE.BoxGeometry(9.5, 0.12, 0.5);
const tieMat = new THREE.MeshStandardMaterial({ color: 0x6d5640, roughness: 1 });
const ties = [];
for (let i = 0; i < 40; i++) {
  const t = new THREE.Mesh(tieGeo, tieMat);
  t.position.z = -i * 3;
  t.receiveShadow = true;
  tieGroup.add(t);
  ties.push(t);
}

// Rails
const railMat = new THREE.MeshStandardMaterial({ color: 0xb0b6c0, metalness: 0.6, roughness: 0.4 });
[-1.4, 1.4].forEach(x => {
  const rail = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 400), railMat);
  rail.position.set(x, 0.1, -120);
  scene.add(rail);
});

// ---------------------------------------------------------------------------
// Buildings (recycled along z)
// ---------------------------------------------------------------------------
const buildings = [];
const buildingGroup = new THREE.Group();
scene.add(buildingGroup);

const palette = [0x8d6e63, 0x607d8b, 0x9575cd, 0x4db6ac, 0xff8a65, 0x90a4ae, 0xa1887f, 0x7986cb];

function makeBuilding() {
  const w = 4 + Math.random() * 5;
  const d = 4 + Math.random() * 5;
  const h = 8 + Math.random() * 30;
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({
    color: palette[(Math.random() * palette.length) | 0],
    roughness: 0.9
  });
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  m.receiveShadow = true;

  // windows
  const winMat = new THREE.MeshStandardMaterial({ color: 0xffe9a8, emissive: 0xffcf6b, emissiveIntensity: 0.5 });
  const cols = Math.max(2, Math.floor(w / 1.4));
  const rows = Math.max(3, Math.floor(h / 2));
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.25) continue;
      const win = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.9), winMat);
      win.position.set(
        -w / 2 + 0.9 + c * (w - 1.8) / (cols - 1 || 1),
        -h / 2 + 1.3 + r * (h - 2.4) / (rows - 1 || 1),
        d / 2 + 0.01
      );
      m.add(win);
    }
  }
  m.userData.h = h;
  return m;
}

function placeBuilding(b, side, z) {
  b.position.set(side * (9 + Math.random() * 10), b.userData.h / 2, z);
  b.rotation.y = (Math.random() - 0.5) * 0.4;
}
for (let i = 0; i < 26; i++) {
  [-1, 1].forEach(side => {
    const b = makeBuilding();
    placeBuilding(b, side, -i * 14 + Math.random() * 6);
    buildingGroup.add(b);
    buildings.push(b);
  });
}

// Streetlights along the track
const lightsGroup = new THREE.Group();
scene.add(lightsGroup);
const poleMat = new THREE.MeshStandardMaterial({ color: 0x37474f, roughness: 1 });
const lampMat = new THREE.MeshStandardMaterial({ color: 0xfff2b0, emissive: 0xffd45e, emissiveIntensity: 0.9 });
const streetlights = [];
function makeLamp() {
  const g = new THREE.Group();
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 6, 8), poleMat);
  pole.position.y = 3;
  pole.castShadow = true;
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 10, 10), lampMat);
  head.position.y = 6;
  g.add(pole, head);
  return g;
}
for (let i = 0; i < 16; i++) {
  [-1, 1].forEach(side => {
    const l = makeLamp();
    l.position.set(side * 6.5, 0, -i * 12);
    lightsGroup.add(l);
    streetlights.push(l);
  });
}

// ---------------------------------------------------------------------------
// Player
// ---------------------------------------------------------------------------
const player = new THREE.Group();
scene.add(player);

const skin = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.8 });
const shirt = new THREE.MeshStandardMaterial({ color: 0x2196f3, roughness: 0.7 });
const pants = new THREE.MeshStandardMaterial({ color: 0x303f9f, roughness: 0.8 });
const shoeMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 });

const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.0, 0.45), shirt);
torso.position.y = 1.45; torso.castShadow = true;
const head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), skin);
head.position.y = 2.2; head.castShadow = true;
const cap = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.18, 0.6), new THREE.MeshStandardMaterial({ color: 0xff5252 }));
cap.position.y = 2.5;

const legL = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.95, 0.34), pants);
const legR = legL.clone();
legL.position.set(-0.22, 0.5, 0); legR.position.set(0.22, 0.5, 0);
legL.castShadow = legR.castShadow = true;
// pivot legs at top
const legLPivot = new THREE.Group(); legLPivot.position.set(-0.22, 0.95, 0);
const legRPivot = new THREE.Group(); legRPivot.position.set(0.22, 0.95, 0);
[legL, legR].forEach(l => { l.position.y = -0.475; });
legLPivot.add(legL); legRPivot.add(legR);

const armL = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.85, 0.22), shirt);
const armR = armL.clone();
const armLPivot = new THREE.Group(); armLPivot.position.set(-0.5, 1.85, 0);
const armRPivot = new THREE.Group(); armRPivot.position.set(0.5, 1.85, 0);
[armL, armR].forEach(a => { a.position.y = -0.4; });
armLPivot.add(armL); armRPivot.add(armR);

player.add(torso, head, cap, legLPivot, legRPivot, armLPivot, armRPivot);

// collision box (logical)
player.userData = {
  lane: 1,
  x: LANES[1],
  y: 0,
  vy: 0,
  jumping: false,
  rolling: false,
  rollT: 0,
  height: 1.95,     // standing height
  rollHeight: 0.9
};

// ---------------------------------------------------------------------------
// Obstacles & coins
// ---------------------------------------------------------------------------
const obstacles = [];
const coins = [];
const obstacleGroup = new THREE.Group();
const coinGroup = new THREE.Group();
scene.add(obstacleGroup, coinGroup);

const trainColors = [0xe53935, 0x3949ab, 0x43a047, 0xfdd835, 0x8e24aa];

function makeTrain(lane) {
  const g = new THREE.Group();
  const len = 8 + Math.random() * 6;
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.9, 2.6, len),
    new THREE.MeshStandardMaterial({ color: trainColors[(Math.random()*trainColors.length)|0], roughness: 0.5, metalness: 0.3 })
  );
  body.position.y = 1.45; body.castShadow = true; body.receiveShadow = true;
  // windows strip
  const win = new THREE.Mesh(new THREE.BoxGeometry(1.95, 0.5, len * 0.85),
    new THREE.MeshStandardMaterial({ color: 0xbfe9ff, emissive: 0x224455, emissiveIntensity: 0.4 }));
  win.position.y = 2.1;
  g.add(body, win);
  g.position.set(LANES[lane], 0, 0);
  g.userData = { type: 'train', lane, z: 0, len, halfDepth: len / 2 };
  return g;
}

function makeBarrier(lane) {
  const g = new THREE.Group();
  const bar = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.9, 0.5),
    new THREE.MeshStandardMaterial({ color: 0xff9800, roughness: 0.8 }));
  bar.position.y = 0.45; bar.castShadow = true;
  // stripes
  for (let i = -1; i <= 1; i++) {
    const s = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.92, 0.52),
      new THREE.MeshStandardMaterial({ color: 0x111111 }));
    s.position.set(i * 0.6, 0.45, 0);
    g.add(s);
  }
  g.add(bar);
  g.position.set(LANES[lane], 0, 0);
  g.userData = { type: 'barrier', lane, z: 0, height: 0.9, halfDepth: 0.3 };
  return g;
}

function makeSign(lane) {
  const g = new THREE.Group();
  const post1 = new THREE.Mesh(new THREE.BoxGeometry(0.18, 3, 0.18), poleMat);
  const post2 = post1.clone();
  post1.position.set(-1.05, 1.5, 0); post2.position.set(1.05, 1.5, 0);
  const board = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.7, 0.15),
    new THREE.MeshStandardMaterial({ color: 0xffeb3b, emissive: 0x665500, emissiveIntensity: 0.3 }));
  board.position.y = 2.85;
  g.add(post1, post2, board);
  g.position.set(LANES[lane], 0, 0);
  // overhead beam you must roll under: gap from 0.9 to 3.0
  g.userData = { type: 'sign', lane, z: 0, gapBottom: 1.0, halfDepth: 0.2 };
  return g;
}

function makeCoin() {
  const c = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.35, 0.08, 18),
    new THREE.MeshStandardMaterial({ color: 0xffd54f, emissive: 0xffb300, emissiveIntensity: 0.5, metalness: 0.7, roughness: 0.3 })
  );
  c.rotation.x = Math.PI / 2;
  c.castShadow = true;
  c.userData = { type: 'coin', z: 0, lane: 0, taken: false };
  return c;
}

// ---------------------------------------------------------------------------
// Spawning
// ---------------------------------------------------------------------------
let spawnZ = -60;
let nextSpawnGap = 22;

function spawnChunk() {
  // choose 1-2 lanes to block with obstacles, leave at least one free
  const freeLane = (Math.random() * 3) | 0;
  const types = ['train', 'barrier', 'sign'];
  for (let lane = 0; lane < 3; lane++) {
    if (lane === freeLane) continue;
    if (Math.random() < 0.55) {
      const t = types[(Math.random() * types.length) | 0];
      let o;
      if (t === 'train') o = makeTrain(lane);
      else if (t === 'barrier') o = makeBarrier(lane);
      else o = makeSign(lane);
      o.position.z = spawnZ;
      o.userData.z = spawnZ;
      obstacleGroup.add(o);
      obstacles.push(o);
    }
  }
  // coins in the free lane (a little arc sometimes)
  const n = 3 + ((Math.random() * 4) | 0);
  for (let i = 0; i < n; i++) {
    const c = makeCoin();
    c.position.set(LANES[freeLane], 0.9, spawnZ + i * 1.6);
    c.userData.z = spawnZ + i * 1.6;
    c.userData.lane = freeLane;
    coinGroup.add(c);
    coins.push(c);
  }
  spawnZ -= nextSpawnGap;
  nextSpawnGap = 16 + Math.random() * 12;
}

// ---------------------------------------------------------------------------
// Audio (Web Audio API, fully procedural)
// ---------------------------------------------------------------------------
const Audio = (function () {
  let ctx = null;
  let master = null;
  let musicTimer = null;
  let enabled = true;

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    master.gain.value = 0.5;
    master.connect(ctx.destination);
  }

  function blip(freq, dur, type, vol, slideTo) {
    if (!ctx || !enabled) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(master);
    o.start(); o.stop(ctx.currentTime + dur);
  }

  function jump() { blip(420, 0.18, 'square', 0.25, 760); }
  function roll() { blip(300, 0.18, 'sawtooth', 0.2, 140); }
  function coin() { blip(880, 0.08, 'square', 0.22); setTimeout(() => blip(1320, 0.09, 'square', 0.2), 60); }
  function crash() {
    if (!ctx || !enabled) return;
    blip(160, 0.5, 'sawtooth', 0.4, 40);
    const noise = ctx.createBufferSource();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    noise.buffer = buf;
    const g = ctx.createGain(); g.gain.value = 0.4;
    noise.connect(g); g.connect(master); noise.start();
  }

  // simple looping background arpeggio
  const notes = [262, 330, 392, 523, 392, 330];
  let step = 0;
  function startMusic() {
    if (!ctx || musicTimer) return;
    musicTimer = setInterval(() => {
      if (!enabled) return;
      const n = notes[step % notes.length];
      blip(n, 0.18, 'triangle', 0.12);
      if (step % 2 === 0) blip(n / 2, 0.22, 'sine', 0.1);
      step++;
    }, 220);
  }
  function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }
  function toggle() {
    enabled = !enabled;
    if (master) master.gain.value = enabled ? 0.5 : 0;
    return enabled;
  }
  function resume() { if (ctx && ctx.state === 'suspended') ctx.resume(); }
  return { init, jump, roll, coin, crash, startMusic, stopMusic, toggle, resume, get enabled() { return enabled; } };
})();

// ---------------------------------------------------------------------------
// Game state
// ---------------------------------------------------------------------------
let state = 'menu'; // menu | playing | over
let speed = BASE_SPEED;
let distance = 0;
let coinCount = 0;
let best = parseInt(localStorage.getItem('subwayRushBest') || '0', 10);

const scoreEl = document.getElementById('score');
const coinEl = document.getElementById('coinCount');
const startScreen = document.getElementById('startScreen');
const overScreen = document.getElementById('overScreen');
const flash = document.getElementById('flash');

function resetGame() {
  // clear obstacles & coins
  obstacles.forEach(o => obstacleGroup.remove(o));
  coins.forEach(c => coinGroup.remove(c));
  obstacles.length = 0; coins.length = 0;
  spawnZ = -60; nextSpawnGap = 22;

  player.userData.lane = 1; player.userData.x = LANES[1];
  player.userData.y = 0; player.userData.vy = 0;
  player.userData.jumping = false; player.userData.rolling = false; player.userData.rollT = 0;
  player.position.set(LANES[1], 0, PLAYER_Z);
  player.rotation.z = 0;

  speed = BASE_SPEED; distance = 0; coinCount = 0;
  // pre-spawn a few chunks
  for (let i = 0; i < 3; i++) spawnChunk();
}

function startGame() {
  Audio.init();
  Audio.resume();
  resetGame();
  state = 'playing';
  startScreen.classList.add('hidden');
  overScreen.classList.add('hidden');
  Audio.startMusic();
}

function gameOver() {
  state = 'over';
  Audio.crash();
  Audio.stopMusic();
  // flash
  flash.style.transition = 'none'; flash.style.opacity = '0.8';
  requestAnimationFrame(() => { flash.style.transition = 'opacity .4s'; flash.style.opacity = '0'; });

  const distInt = Math.floor(distance);
  if (distInt > best) { best = distInt; localStorage.setItem('subwayRushBest', best); }
  document.getElementById('finalScore').textContent = distInt;
  document.getElementById('finalCoins').textContent = coinCount;
  document.getElementById('bestLine').textContent = 'Best: ' + best + ' m';
  overScreen.classList.remove('hidden');
}

// ---------------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------------
function moveLane(dir) {
  if (state !== 'playing') return;
  const u = player.userData;
  const nl = Math.min(2, Math.max(0, u.lane + dir));
  if (nl !== u.lane) u.lane = nl;
}
function doJump() {
  if (state !== 'playing') return;
  const u = player.userData;
  if (!u.jumping && !u.rolling) {
    u.vy = JUMP_V; u.jumping = true; Audio.jump();
  }
}
function doRoll() {
  if (state !== 'playing') return;
  const u = player.userData;
  if (!u.rolling && !u.jumping) {
    u.rolling = true; u.rollT = ROLL_TIME; Audio.roll();
  } else if (u.jumping) {
    u.vy = -JUMP_V * 1.4; // fast-fall into roll
  }
}

window.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowLeft': case 'a': case 'A': moveLane(-1); break;
    case 'ArrowRight': case 'd': case 'D': moveLane(1); break;
    case 'ArrowUp': case 'w': case 'W': case ' ': doJump(); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': doRoll(); break;
  }
});

// Touch swipe
let touchStartX = 0, touchStartY = 0, touchActive = false;
renderer.domElement.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; touchActive = true;
}, { passive: true });
renderer.domElement.addEventListener('touchend', e => {
  if (!touchActive) return; touchActive = false;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (Math.abs(dx) > 24) moveLane(dx > 0 ? 1 : -1);
  } else {
    if (Math.abs(dy) > 24) { if (dy < 0) doJump(); else doRoll(); }
  }
}, { passive: true });

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ---------------------------------------------------------------------------
// Animation loop
// ---------------------------------------------------------------------------
let last = performance.now();
let runPhase = 0;

function update(dt) {
  const u = player.userData;

  // difficulty ramp
  speed = BASE_SPEED + Math.min(22, distance / 90);
  distance += speed * dt;

  // player horizontal lerp
  u.x += (LANES[u.lane] - u.x) * Math.min(1, dt * 12);
  player.position.x = u.x;

  // vertical
  if (u.jumping) {
    u.vy += GRAVITY * dt;
    u.y += u.vy * dt;
    if (u.y <= 0) { u.y = 0; u.vy = 0; u.jumping = false; }
  }
  // roll timer
  if (u.rolling) {
    u.rollT -= dt;
    if (u.rollT <= 0) u.rolling = false;
  }

  // apply scale/rotation for roll
  const targetScaleY = u.rolling ? 0.5 : 1;
  player.scale.y += (targetScaleY - player.scale.y) * Math.min(1, dt * 18);
  player.position.y = u.y;
  player.rotation.z += ((u.rolling ? -0.5 : 0) - player.rotation.z) * Math.min(1, dt * 14);

  // running animation
  runPhase += dt * (10 + speed * 0.25);
  const swing = Math.sin(runPhase) * 0.9;
  if (!u.rolling) {
    legLPivot.rotation.x = swing; legRPivot.rotation.x = -swing;
    armLPivot.rotation.x = -swing; armRPivot.rotation.x = swing;
  } else {
    legLPivot.rotation.x = 0.2; legRPivot.rotation.x = 0.2;
    armLPivot.rotation.x = -1.4; armRPivot.rotation.x = -1.4;
  }

  // move obstacles & coins toward camera
  const moveAmt = speed * dt;
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.position.z += moveAmt;
    o.userData.z = o.position.z;
    if (o.userData.z > DESPAWN_Z) { obstacleGroup.remove(o); obstacles.splice(i, 1); continue; }
    checkObstacle(o);
    if (state === 'over') return;
  }
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.position.z += moveAmt;
    c.userData.z = c.position.z;
    c.rotation.z += dt * 4;
    if (c.userData.z > DESPAWN_Z) { coinGroup.remove(c); coins.splice(i, 1); continue; }
    checkCoin(c);
  }

  // scroll ties & scenery
  tieGroup.children.forEach(t => {
    t.position.z += moveAmt;
    if (t.position.z > 8) t.position.z -= 40 * 3;
  });
  buildings.forEach(b => {
    b.position.z += moveAmt;
    if (b.position.z > 20) {
      b.position.z -= 26 * 14;
      placeBuilding(b, Math.sign(b.position.x), b.position.z);
      b.material.color.setHex(palette[(Math.random()*palette.length)|0]);
    }
  });
  streetlights.forEach(l => {
    l.position.z += moveAmt;
    if (l.position.z > 20) l.position.z -= 16 * 12;
  });

  // spawn more ahead
  if (spawnZ > -200) spawnChunk();
}

function playerBox() {
  const u = player.userData;
  const h = u.rolling ? u.rollHeight : u.height;
  const yTop = u.y + h;
  const yBottom = u.y;
  return { lane: u.lane, x: u.x, yBottom, yTop, halfDepth: 0.4 };
}

function checkObstacle(o) {
  const u = player.userData;
  const d = o.userData;
  // same lane & close in z
  if (Math.abs(o.position.z - PLAYER_Z) < d.halfDepth + 0.4 && Math.abs(u.x - o.position.x) < 1.1) {
    if (d.type === 'train') {
      gameOver();
    } else if (d.type === 'barrier') {
      if (u.y < d.height - 0.1) gameOver(); // must jump above it
    } else if (d.type === 'sign') {
      // overhead: must roll (low enough). gapBottom = 1.0
      const ph = u.rolling ? u.rollHeight : u.height;
      const top = u.y + ph;
      if (top > d.gapBottom) gameOver();
    }
  }
}

function checkCoin(c) {
  const u = player.userData;
  if (Math.abs(c.position.z - PLAYER_Z) < 0.7 && Math.abs(u.x - c.position.x) < 1.2) {
    const ph = u.rolling ? u.rollHeight : u.height;
    const top = u.y + ph;
    const cy = c.position.y;
    if (top > cy - 0.6 && (u.y + 0) < cy + 0.6) {
      c.userData.taken = true;
      coinGroup.remove(c);
      coins.splice(coins.indexOf(c), 1);
      coinCount++;
    }
  }
}

function render() {
  renderer.render(scene, camera);
}

function loop(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.05) dt = 0.05; // clamp
  if (state === 'playing') update(dt);
  // HUD
  scoreEl.textContent = Math.floor(distance);
  coinEl.textContent = coinCount;
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ---------------------------------------------------------------------------
// Resize
// ---------------------------------------------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// mute toggle on 'm'
window.addEventListener('keydown', e => {
  if (e.key === 'm' || e.key === 'M') Audio.toggle();
});

})();
</script>
</body>
