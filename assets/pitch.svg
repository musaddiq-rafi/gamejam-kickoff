<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe9ff"/>
      <stop offset="1" stop-color="#eaf7ff"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3aa64a"/>
      <stop offset="1" stop-color="#2e8b3d"/>
    </linearGradient>
  </defs>

  <rect width="900" height="420" fill="url(#sky)"/>
  <rect y="300" width="900" height="120" fill="url(#grass)"/>
  <line x1="0" y1="300" x2="900" y2="300" stroke="#ffffff" stroke-width="3" opacity="0.8"/>

  <!-- lane markers -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.5">
    <line x1="0" y1="340" x2="900" y2="340"/>
    <line x1="0" y1="380" x2="900" y2="380"/>
  </g>

  <!-- stars -->
  <g fill="#ffd54f" stroke="#e0a800" stroke-width="2">
    <polygon points="160,150 168,172 191,172 172,186 179,208 160,193 141,208 148,186 129,172 152,172"/>
    <polygon points="300,120 307,140 328,140 311,153 317,173 300,160 283,173 289,153 272,140 293,140"/>
    <polygon points="470,150 477,170 497,170 480,183 486,203 470,190 454,203 460,183 443,170 463,170"/>
  </g>

  <!-- green keeper with arms spread -->
  <g transform="translate(700,210)">
    <rect x="-26" y="0" width="52" height="70" rx="10" fill="#2ecc71"/>
    <circle cx="0" cy="-14" r="16" fill="#c98a5b"/>
    <rect x="-60" y="14" width="34" height="16" rx="6" fill="#2ecc71"/>
    <rect x="26" y="14" width="34" height="16" rx="6" fill="#2ecc71"/>
    <rect x="-58" y="10" width="14" height="14" rx="4" fill="#f5f5f5"/>
    <rect x="44" y="10" width="14" height="14" rx="4" fill="#f5f5f5"/>
    <text x="0" y="105" text-anchor="middle" font-size="14" fill="#0b3d1a" font-weight="700">KEEPER (jump over)</text>
  </g>

  <!-- blue rival -->
  <g transform="translate(500,225)">
    <rect x="-18" y="0" width="36" height="60" rx="9" fill="#1e88e5"/>
    <circle cx="0" cy="-12" r="14" fill="#c98a5b"/>
    <text x="0" y="90" text-anchor="middle" font-size="14" fill="#0b3d5a" font-weight="700">RIVAL (switch lane)</text>
  </g>

  <!-- player (red) with ball -->
  <g transform="translate(250,225)">
    <rect x="-20" y="0" width="40" height="64" rx="10" fill="#e53935"/>
    <circle cx="0" cy="-14" r="16" fill="#f1c27d"/>
    <rect x="-10" y="64" width="9" height="22" rx="3" fill="#111111"/>
    <rect x="1" y="64" width="9" height="22" rx="3" fill="#111111"/>
    <circle cx="22" cy="78" r="12" fill="#ffffff" stroke="#222" stroke-width="2"/>
    <text x="0" y="108" text-anchor="middle" font-size="14" fill="#7a1212" font-weight="800">YOU (red)</text>
  </g>

  <text x="450" y="30" text-anchor="middle" font-size="22" fill="#0b3d1a" font-weight="800">KICKOFF RUSH — side view</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#234">Collect ★ stars · dodge blue rivals · JUMP the green keeper</text>
</svg>
